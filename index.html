<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Smart Budget Tracker | Expense Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="budget-container">
  <div class="app-header">
    <h1>💰 Budget Tracker <span>smart</span></h1>
    <div class="sub">Track expenses · Save smarter</div>
  </div>

  <div class="balance-panel">
    <div class="balance-card">
      <div class="balance-label">Current Balance</div>
      <div class="balance-amount" id="totalBalanceDisplay">$0.00</div>
      <div class="balance-detail">
        <div class="detail-item">
          <div class="detail-label">💰 Total Income</div>
          <div class="detail-number" id="totalIncomeDisplay">$0</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">💸 Total Expenses</div>
          <div class="detail-number" id="totalExpenseDisplay">$0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-title">📝 Add transaction</div>
    <div class="transaction-form">
      <div class="input-group">
        <label>Description</label>
        <input type="text" id="txName" placeholder="e.g., Groceries, Freelance" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Amount ($)</label>
        <input type="number" id="txAmount" placeholder="0.00" step="0.01">
      </div>
      <div class="input-group">
        <label>Type</label>
        <select id="txType">
          <option value="income">💹 Income</option>
          <option value="expense">📉 Expense</option>
        </select>
      </div>
      <div class="input-group">
        <label>Category</label>
        <input type="text" id="txCategory" placeholder="Food / Salary / etc" autocomplete="off">
      </div>
      <button class="btn-add" id="addBtn">+ Add transaction</button>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">🔍 All</button>
      <button class="filter-btn" data-filter="income">💹 Income</button>
      <button class="filter-btn" data-filter="expense">💸 Expenses</button>
    </div>
    <button class="delete-all" id="deleteAllBtn">🗑️ Delete all transactions</button>
  </div>

  <div class="entries-section">
    <div class="entries-header">
      <span>📋 Recent transactions</span>
      <span id="itemCount">0 items</span>
    </div>
    <div id="transactionsList" class="transaction-list">
      <div class="empty-message">✨ No transactions yet. Add your first income or expense! ✨</div>
    </div>
  </div>
  <footer>
    ⚡ Smart Budget Manager | filter, add, delete | fully functional
  </footer>
</div>


<script src="script.js"></script>
</body>
</html>
